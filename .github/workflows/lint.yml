name: Lint & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-lint:
    name: Python — Ruff + Black + Pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — lint
        run: ruff check agent/ lambda/ tests/

      - name: Black — format check
        run: black --check agent/ lambda/ tests/

      - name: Pytest — unit tests
        run: pytest tests/ -v --tb=short
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  terraform-lint:
    name: Terraform — fmt + validate + tflint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check — generated
        run: |
          if find terraform/generated -name "*.tf" | grep -q .; then
            terraform fmt -check -recursive terraform/generated/
          else
            echo "No generated Terraform files to check — skipping"
          fi

      - name: Terraform init — generated
        run: |
          if find terraform/generated -name "*.tf" | grep -q .; then
            terraform init -backend=false terraform/generated/
          else
            echo "No generated Terraform files to init — skipping"
          fi

      - name: Terraform validate — generated
        run: |
          if find terraform/generated -name "*.tf" | grep -q .; then
            terraform validate terraform/generated/
          else
            echo "No generated Terraform files to validate — skipping"
          fi

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint — generated Terraform
        run: |
          if find terraform/generated -name "*.tf" | grep -q .; then
            tflint --chdir=terraform/generated
          else
            echo "No generated Terraform files to lint — skipping"
          fi

  security-scan:
    name: Security — Checkov
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Checkov
        run: pip install checkov

      - name: Checkov — scan Terraform
        run: |
          checkov \
            --directory terraform/generated \
            --framework terraform \
            --output cli \
            --soft-fail \
            --skip-check CKV_AWS_79,CKV2_AWS_5

      - name: Checkov — scan Python (SAST)
        run: |
          checkov \
            --directory lambda \
            --framework sast_python \
            --output cli \
            --soft-fail

      - name: Checkov — scan GitHub Actions workflows
        run: |
          checkov \
            --directory .github/workflows \
            --framework github_actions \
            --output cli \
            --soft-fail
