name: Provision Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/generated/**"
      - "terraform/modules/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/generated/**"
      - "terraform/modules/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      plan-exit-code: ${{ steps.plan.outputs.exit-code }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROVISIONER_ROLE_ARN }}
          role-session-name: infra-agent-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=infra-agent/${{ github.event.inputs.environment || 'staging' }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"
        working-directory: terraform/generated

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: terraform/generated

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -out=tfplan \
            -var="environment=${{ github.event.inputs.environment || 'staging' }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="container_image=nginx:latest" \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var='private_subnets=${{ vars.PRIVATE_SUBNETS }}' \
            -var='public_subnets=${{ vars.PUBLIC_SUBNETS }}' \
            -detailed-exitcode 2>&1 | tee plan.txt
          echo "exit-code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        working-directory: terraform/generated

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/generated/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/generated/tfplan
          retention-days: 7

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: ${{ github.event.inputs.environment || 'staging' }}
    if: |
      github.ref == 'refs/heads/main' &&
      needs.terraform-plan.outputs.plan-exit-code == '2'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROVISIONER_ROLE_ARN }}
          role-session-name: infra-agent-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=infra-agent/${{ github.event.inputs.environment || 'staging' }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"
        working-directory: terraform/generated

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/generated/

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'staging' }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="container_image=nginx:latest" \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var='private_subnets=${{ vars.PRIVATE_SUBNETS }}' \
            -var='public_subnets=${{ vars.PUBLIC_SUBNETS }}' \
            tfplan
        working-directory: terraform/generated

      - name: Output service URL
        run: |
          SERVICE_URL=$(terraform output -raw service_url 2>/dev/null || echo "N/A")
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Service URL: ${SERVICE_URL}" >> $GITHUB_STEP_SUMMARY
        working-directory: terraform/generated